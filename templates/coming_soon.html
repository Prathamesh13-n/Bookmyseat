{% extends "users/basic.html" %}
{% block content %}

<div class="container text-center" style="padding: 80px 20px;">
  <i class="fas fa-rocket" style="font-size:60px; color:#e74c3c; margin-bottom:20px;"></i>
  <h2 class="font-weight-bold mb-2">{{ feature_name }} — Coming Soon!</h2>
  <p class="text-muted mb-4" style="font-size:15px;">
    We're working hard to bring {{ feature_name }} booking to BookMySeat. Stay tuned!
  </p>
  <a href="{% url 'movie_list' %}" class="btn btn-danger px-4 py-2">
    <i class="fas fa-film mr-2"></i> Browse Movies Instead
  </a>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

{% endblock %}
